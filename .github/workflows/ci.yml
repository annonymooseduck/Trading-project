name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile app and test files
        run: |
          python -m compileall Home.py database.py pages tests

      - name: Run pytest
        run: |
          python -m pytest -q

      - name: Smoke test Streamlit startup
        run: |
          python -m streamlit run Home.py \
            --server.headless true \
            --server.address 127.0.0.1 \
            --server.port 8501 \
            --browser.gatherUsageStats false \
            --server.fileWatcherType none > streamlit.log 2>&1 &

          for attempt in $(seq 1 30); do
            if curl --silent --fail http://127.0.0.1:8501/ > /dev/null; then
              echo "Streamlit started successfully"
              exit 0
            fi

            sleep 2
          done

          echo "Streamlit did not start in time"
          cat streamlit.log
          exit 1